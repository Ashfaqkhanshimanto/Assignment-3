<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Collaborative Editor Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow-lg p-4" style="width: 450px;">
      <h2 class="text-center mb-2">Collaborative Editor</h2>
      <p class="text-center text-muted mb-3">enter/create room name and password to start</p>
      <div class="mb-3">
        <label class="form-label">Room Name</label>
        <input type="text" id="room" class="form-control" placeholder="Enter room name" required>
        <div class="form-text" class="text-danger">Only characters & (-) only, e.g. <b>assignment-room</b></div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter room password" required>
      </div>
      <div class="d-grid">
        <button id="joinBtn" class="btn btn-primary">Open Editor</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("joinBtn").addEventListener("click", () => {
      const room = document.getElementById("room").value.trim()
      const password = document.getElementById("password").value.trim()

      if (!room || !password) {
        alert("Please enter/create both room name and password.")
        return
      }

      localStorage.setItem("collab_room", room)
      localStorage.setItem("collab_password", password)

      window.location.href = "editor.html"
    })
  </script>
</body>
</html>
