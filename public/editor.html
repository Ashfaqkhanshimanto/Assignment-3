<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Collaborative Editor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1 py-3">Collaborative Editor</span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mt-4 editor-page">
        <div class="card shadow-sm h-100">            
            <div class="card-body"> 
                <div class="d-flex align-items-center justify-content-between p-1 mb-2">
                    <h5 class="card-title fs-4">Editor Workspace</h5>
                    <div id="roomInfo" class="badge bg-primary fs-6"></div>
                </div>               
                <textarea
                    id="editor"
                    class="form-control"
                    placeholder="Start typing here..."></textarea>
            </div>
        </div>
    </div>

  <script type="module" src="app.js"></script>
</body>
</html>
